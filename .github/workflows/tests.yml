name: Tests

on:
  pull_request:
  push:
    branches:
      - main
      - work

jobs:
  php-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring,bcmath,pdo_sqlite,sqlite3
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
          mkdir -p database
          touch database/database.sqlite

      - name: Configure test environment
        run: |
          {
            echo "APP_ENV=testing"
            echo "APP_DEBUG=true"
            echo "DB_CONNECTION=sqlite"
            echo "DB_DATABASE=${{ github.workspace }}/database/database.sqlite"
            echo "CACHE_STORE=array"
            echo "SESSION_DRIVER=array"
            echo "QUEUE_CONNECTION=sync"
            echo "MAIL_MAILER=array"
          } >> .env

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run targeted tests
        run: php artisan test tests/Feature/Api/OrderStoreTest.php tests/Unit/OrderLifecycleStatusContractTest.php

      - name: Run related order API tests
        run: php artisan test tests/Feature/Api --filter=Order
