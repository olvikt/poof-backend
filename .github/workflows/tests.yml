name: Tests

on:
  pull_request:
  push:
    branches:
      - main
      - work

jobs:
  release-gates-drift:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Verify release gate docs are in sync with workflow
        run: php scripts/check-release-gates-drift.php

  php-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Validate Composer manifest
        run: composer validate --strict

      - name: PHP syntax lint
        run: |
          files=$(find app bootstrap config database public routes scripts tests -type f -name '*.php')
          if [ -z "$files" ]; then
            echo 'No PHP files found to lint.'
            exit 1
          fi
          echo "$files" | xargs -n 1 php -l

  php-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring,bcmath,pdo_sqlite,sqlite3
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
          mkdir -p database
          touch database/database.sqlite

      - name: Configure test environment
        run: |
          {
            echo "APP_ENV=testing"
            echo "APP_DEBUG=true"
            echo "DB_CONNECTION=sqlite"
            echo "DB_DATABASE=${{ github.workspace }}/database/database.sqlite"
            echo "CACHE_STORE=array"
            echo "SESSION_DRIVER=array"
            echo "QUEUE_CONNECTION=sync"
            echo "MAIL_MAILER=array"
          } >> .env

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run minimal blocking release suite
        run: |
          php artisan test \
            tests/Feature/Api/OrderStoreTest.php \
            tests/Unit/OrderLifecycleStatusContractTest.php \
            tests/Unit/Support/Address/AddressPrecisionTest.php \
            tests/Unit/Support/Address/AddressCoordinatePolicyTest.php \
            tests/Feature/Admin/AdminProtectedRoutesAuthTest.php \
            tests/Feature/Api/ApiProtectedRoutesAuthTest.php \
            tests/Feature/Courier/AcceptFlowArchitectureRegressionTest.php \
            tests/Feature/Courier/CourierRuntimeStateSyncTest.php \
            tests/Feature/Api/GeocodeControllerTest.php \
            tests/Unit/Address/PrepareAddressSavePayloadTest.php \
            tests/Unit/Address/FilterClientAddressPayloadTest.php \
            tests/Unit/Address/PersistAddressDataTest.php \
            tests/Unit/Address/PersistClientAddressTest.php \
            tests/Unit/Address/ResolveAddressFromPointTest.php \
            tests/Unit/Address/ResolveAddressPointFromFieldsTest.php \
            tests/Feature/Auth/RegisterTest.php \
            tests/Unit/Orders/LifecycleActionContractsTest.php


  pwa-regression-evidence:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring,bcmath,pdo_sqlite,sqlite3
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
          mkdir -p database
          touch database/database.sqlite

      - name: Configure test environment
        run: |
          {
            echo "APP_ENV=testing"
            echo "APP_DEBUG=true"
            echo "DB_CONNECTION=sqlite"
            echo "DB_DATABASE=${{ github.workspace }}/database/database.sqlite"
            echo "CACHE_STORE=array"
            echo "SESSION_DRIVER=array"
            echo "QUEUE_CONNECTION=sync"
            echo "MAIL_MAILER=array"
          } >> .env

      - name: Run migrations
        run: php artisan migrate --force

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm deps
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Verify frontend build artifacts
        run: test -f public/build/manifest.json

      - name: Run narrow PWA regression evidence suite
        run: |
          php artisan test \
            tests/Unit/Pwa/ManifestContractTest.php \
            tests/Unit/Pwa/FrontendPwaContractTest.php \
            tests/Unit/Pwa/ServiceWorkerContractTest.php \
            tests/Feature/Pwa/LandingPagePwaManifestLinkTest.php


  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies required by the frontend build
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm deps
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Verify frontend build artifacts
        run: test -f public/build/manifest.json
