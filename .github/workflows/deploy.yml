name: Deploy to production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H api.poof.com.ua >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh root@api.poof.com.ua "cd /var/www/poof && bash scripts/deploy.sh"
